---
- name: Vérifier que cs2_public_ip est défini
  assert:
    that:
      - cs2_public_ip is defined
      - cs2_public_ip != "TON_IP_PUBLIQUE"
      - cs2_public_ip | length > 0
    fail_msg: "ERREUR : cs2_public_ip n'est pas défini dans group_vars/all.yml"

- name: Vérifier que cs2_gslt_token est défini
  assert:
    that:
      - cs2_gslt_token is defined
      - cs2_gslt_token != "TON_TOKEN_GSLT"
      - cs2_gslt_token | length > 0
    fail_msg: "ERREUR : cs2_gslt_token n'est pas défini dans group_vars/all.yml"

- name: Ajouter l'architecture i386
  command: dpkg --add-architecture i386
  changed_when: false

- name: Mettre à jour apt
  apt:
    update_cache: true

- name: Installer les dépendances
  apt:
    name:
      - screen
      - lib32gcc-s1
      - python3
      - python3-pip
      - curl
      - tar
    state: present

- name: Installer python-a2s
  pip:
    name: python-a2s
    break_system_packages: true

- name: Créer l'utilisateur cs2server
  user:
    name: cs2server
    shell: /bin/bash
    create_home: true

- name: Créer le répertoire steamcmd
  file:
    path: /home/cs2server/steamcmd
    state: directory
    owner: cs2server
    group: cs2server

- name: Télécharger SteamCMD
  get_url:
    url: https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz
    dest: /tmp/steamcmd_linux.tar.gz

- name: Extraire SteamCMD
  unarchive:
    src: /tmp/steamcmd_linux.tar.gz
    dest: /home/cs2server/steamcmd
    remote_src: true
    owner: cs2server
    group: cs2server

- name: Installer CS2 via SteamCMD
  become_user: cs2server
  command: >
    /home/cs2server/steamcmd/steamcmd.sh
    +login anonymous
    +force_install_dir /home/cs2server/cs2-server
    +app_update 730
    +quit
  args:
    creates: /home/cs2server/cs2-server/game/bin/linuxsteamrt64/cs2

- name: Créer le répertoire cfg
  file:
    path: /home/cs2server/cs2-server/game/csgo/cfg
    state: directory
    owner: cs2server
    group: cs2server

- name: Déployer start_cs2.sh
  template:
    src: start_cs2.sh.j2
    dest: /home/cs2server/start_cs2.sh
    owner: cs2server
    group: cs2server
    mode: '0755'

- name: Déployer server.cfg
  template:
    src: server.cfg.j2
    dest: /home/cs2server/cs2-server/game/csgo/cfg/server.cfg
    owner: cs2server
    group: cs2server
    mode: '0644'

- name: Déployer check_cs2.py
  template:
    src: check_cs2.py.j2
    dest: /home/cs2server/check_cs2.py
    owner: cs2server
    group: cs2server
    mode: '0755'

- name: Déployer COMMANDES.md
  copy:
    src: COMMANDES.md
    dest: /home/cs2server/COMMANDES.md
    owner: cs2server
    group: cs2server
    mode: '0644'
