---
- name: Send RCON Command
  hosts: cs2
  become: true
  become_user: cs2server

  tasks:
    - name: Vérifier que cs2_rcon_command est défini
      assert:
        that:
          - cs2_rcon_command is defined
          - cs2_rcon_command | length > 0
        fail_msg: "ERREUR : cs2_rcon_command n'est pas défini (survey variable)"

    - name: Vérifier si le serveur tourne
      shell: pgrep -x cs2
      register: cs2_process
      failed_when: false
      changed_when: false

    - name: Envoyer la commande
      shell: screen -S cs2 -X stuff "{{ cs2_rcon_command }}$(printf '\r')"
      when: cs2_process.rc == 0

    - name: Serveur non démarré
      fail:
        msg: "Le serveur CS2 n'est pas en cours d'exécution."
      when: cs2_process.rc != 0
