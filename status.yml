---
- name: CS2 Server Status
  hosts: cs2
  become: true
  become_user: cs2server

  tasks:
    - name: Vérifier le processus CS2
      shell: pgrep -af "cs2 -dedicated"
      register: cs2_process
      failed_when: false
      changed_when: false

    - name: Interroger le serveur via a2s
      shell: python3 /home/cs2server/check_cs2.py
      register: cs2_info
      failed_when: false
      changed_when: false
      when: cs2_process.rc == 0

    - name: Afficher le statut (serveur arrêté)
      debug:
        msg: "STOPPED"
      when: cs2_process.rc != 0

    - name: Afficher le statut (serveur en cours)
      debug:
        msg: "{{ ('RUNNING — PID: ' + cs2_process.stdout.split()[0] + '\n\n' + cs2_info.stdout) if cs2_info.rc == 0 else ('RUNNING — PID: ' + cs2_process.stdout.split()[0] + '\n\nErreur a2s:\n' + cs2_info.stderr) }}"
      when: cs2_process.rc == 0
