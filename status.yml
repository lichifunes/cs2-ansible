---
- name: CS2 Server Status
  hosts: cs2
  become: true
  become_user: cs2server

  tasks:
    - name: Vérifier si le serveur tourne
      shell: screen -ls | grep -q cs2
      register: screen_check
      failed_when: false
      changed_when: false

    - name: Vérifier le processus CS2
      shell: pgrep -a cs2 | grep dedicated || true
      register: cs2_process
      changed_when: false

    - name: Afficher le statut
      debug:
        msg: >-
          {{ 'RUNNING' if screen_check.rc == 0 else 'STOPPED' }}
          {{ '— PID: ' + cs2_process.stdout.split()[0] if cs2_process.stdout else '' }}
