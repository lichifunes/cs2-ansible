---
- name: Update CS2 Server
  hosts: cs2
  become: true
  become_user: cs2server

  tasks:
    - name: Vérifier si le serveur tourne
      shell: pgrep -f "cs2 -dedicated"
      register: cs2_process
      failed_when: false
      changed_when: false

    - name: Arrêter le serveur CS2
      shell: screen -S cs2 -X stuff "quit$(printf '\r')"
      when: cs2_process.rc == 0
      ignore_errors: true

    - name: Attendre l'arrêt
      pause:
        seconds: 5
      when: cs2_process.rc == 0

    - name: Mettre à jour CS2 via SteamCMD
      command: >
        /home/cs2server/steamcmd/steamcmd.sh
        +login anonymous
        +force_install_dir /home/cs2server/cs2-server
        +app_update 730
        +quit

    - name: Démarrer le serveur CS2
      shell: screen -S cs2 -d -m /home/cs2server/start_cs2.sh
      args:
        chdir: /home/cs2server
